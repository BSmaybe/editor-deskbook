  /floors/{floor_id}/lock:
    get:
      tags: [Floor Lock]
      summary: Статус блокировки
      security:
        - BearerAuth: []
      parameters:
        - name: floor_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockState"
    post:
      tags: [Floor Lock]
      summary: Заблокировать этаж (TTL 10 мин)
      security:
        - BearerAuth: []
      parameters:
        - name: floor_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Заблокировано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockState"
        "423":
          description: Уже заблокирован другим пользователем
    delete:
      tags: [Floor Lock]
      summary: Снять блокировку (только владелец)
      security:
        - BearerAuth: []
      parameters:
        - name: floor_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Разблокировано

