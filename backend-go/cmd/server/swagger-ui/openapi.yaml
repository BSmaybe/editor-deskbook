      parameters:
        - name: floor_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LayoutState"

  /floors/{floor_id}/layout/published.svg:
    get:
      tags: [Render]
      summary: Опубликованный layout как SVG
      parameters:
        - name: floor_id
          in: path
          required: true
          schema:
            type: integer
