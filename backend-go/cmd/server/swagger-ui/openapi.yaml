        - BearerAuth: []
      parameters:
        - name: floor_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    action:
                      type: string
                    username:
                      type: string
                    created_at:
                      type: string
                      format: date-time

  /floors/{floor_id}/layout/revisions:
    get:
      tags: [Layout]
      summary: Список ревизий
      security:
        - BearerAuth: []
      parameters:
        - name: floor_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    status:
                      type: string
                      enum: [draft, published, archived]
                    version:
                      type: integer
                    is_current:
                      type: boolean
                    created_at:
                      type: string
                      format: date-time

  /floors/{floor_id}/layout/revisions/{revision_id}:
    get:
      tags: [Layout]
      summary: Получить ревизию
      security:
        - BearerAuth: []
      parameters:
        - name: floor_id
          in: path
          required: true
          schema:
            type: integer
        - name: revision_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Layout из ревизии

  /floors/{floor_id}/layout/revisions/{revision_id}/restore:
    post:
      tags: [Layout]
      summary: Восстановить ревизию как новый черновик
      security:
        - BearerAuth: []
      parameters:
        - name: floor_id
          in: path
          required: true
