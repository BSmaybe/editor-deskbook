        - name: floor_id
          in: query
          schema:
            type: integer
          description: Фильтр по этажу
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Desk"

  /desks/{desk_id}:
    get:
      tags: [Desks]
      summary: Получить рабочее место
      parameters:
        - name: desk_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Desk"
    patch:
      tags: [Desks]
      summary: Обновить рабочее место
      security:
        - BearerAuth: []
      parameters:
        - name: desk_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                type:
                  type: string
                  enum: [flex, fixed]
                space_type:
                  type: string
                assigned_to:
                  type: string
                position_x:
                  type: number
                position_y:
                  type: number
                w:
                  type: number
                h:
                  type: number
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Desk"
    delete:
      tags: [Desks]
      summary: Удалить рабочее место
      security:
        - BearerAuth: []
      parameters:
        - name: desk_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Удалён

