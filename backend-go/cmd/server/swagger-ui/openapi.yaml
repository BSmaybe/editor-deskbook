  /admin/cleanup/revisions:
    post:
      tags: [Admin]
      summary: Удалить старые архивные ревизии (admin-only)
      description: "Удаляет archived-ревизии старше N дней. Текущий draft и published не трогает."
      security:
        - BearerAuth: []
      parameters:
        - name: older_than_days
          in: query
          schema:
            type: integer
            default: 90
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
