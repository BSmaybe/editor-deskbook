services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deskbook}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Run migrations before API starts
  migrate:
    image: postgres:16-alpine
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-go/migrations:/migrations:ro
    entrypoint: >
      sh -c "PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /migrations/001_schema.sql"
    restart: "no"

  # Go API — single backend for all endpoints
  api:
    build: ./backend-go
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - api_static:/app/static

  # React admin — editor + components
  admin:
    build: ./frontend/admin-react
    restart: unless-stopped
    ports:
      - "5175:80"
    depends_on:
      - api

volumes:
  postgres_data:
  api_static:
