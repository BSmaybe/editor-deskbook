services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deskbook}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Run migrations before API starts
  migrate:
    image: postgres:16-alpine
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-go/migrations:/migrations:ro
    entrypoint: >
      sh -c "PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /migrations/001_schema.sql && PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /migrations/002_templates.sql && PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /migrations/003_blocks.sql"
    restart: "no"

  # Go API — single backend for all endpoints
  api:
    build: ./backend-go
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - api_static:/app/static
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # React admin — nginx frontend, proxies /api to Go API
  admin:
    build: ./frontend/admin-react
    restart: unless-stopped
    ports:
      - "${DESKBOOK_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pg_backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "
        while true; do
          FILENAME=/backups/deskbook_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h postgres -U $${POSTGRES_USER} $${POSTGRES_DB} | gzip > $$FILENAME;
          echo \"[backup] saved $$FILENAME\";
          find /backups -name '*.sql.gz' -mtime +7 -delete;
          sleep 21600;
        done
      "

volumes:
  postgres_data:
  api_static:
