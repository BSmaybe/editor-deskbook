# SSL/TLS nginx configuration template for DeskBook.
# Used with docker-compose.ssl.yml overlay (certbot webroot method).
#
# Requires environment variable: DESKBOOK_DOMAIN
# Applied via nginx envsubst at container startup.
#
# Usage:
#   DESKBOOK_DOMAIN=app.example.com docker compose \
#     -f docker-compose.prod.yml -f docker-compose.ssl.yml up -d

# HTTP → HTTPS redirect + ACME challenge for certbot renewal
server {
    listen 80;
    server_name ${DESKBOOK_DOMAIN};

    # certbot webroot challenge — must remain accessible over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name ${DESKBOOK_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DESKBOOK_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DESKBOOK_DOMAIN}/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS (2 years) — only send after cert is confirmed valid
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 20m;

    # .mjs must be served as JS so PDF.js module worker loads correctly
    types {
        application/javascript  mjs;
    }
    include /etc/nginx/mime.types;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Forwarded-Proto "https" always;

    location ^~ /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
